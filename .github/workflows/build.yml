name: Build Remoter Executor

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build C++ Core
      run: cmake --build build --config Release

    - name: Publish UI
      run: dotnet publish ui/RblxExecutorUI.csproj -c Release -r win-x64 --self-contained true -o publish

    - name: Finalize Build Package
      shell: pwsh
      run: |
        if (Test-Path "build/Release/Remoter.dll") {
          Copy-Item "build/Release/Remoter.dll" -Destination "publish/"
        } else {
          Write-Error "Remoter.dll not found in build/Release/"
          exit 1
        }

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Remoter-Executor-Build
        path: publish/
